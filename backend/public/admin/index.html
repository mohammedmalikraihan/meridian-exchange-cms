<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Meridian Exchange CMS</title><link rel="stylesheet" href="admin.css"></head><body><header><h1>Meridian Exchange CMS</h1><p>Manage speakers, sponsors and partners.</p></header><main><section class="login"><input id="password" type="password" placeholder="CMS password"><button id="savePassword">Unlock CMS</button></section><nav><button data-tab="speakers" class="active">Speakers</button><button data-tab="partners">Sponsors & Partners</button></nav><section id="speakers" class="panel active"><div class="panel-head"><h2>Speakers</h2><button id="newSpeaker">Add Speaker</button></div><div id="speakerList" class="list"></div></section><section id="partners" class="panel"><div class="panel-head"><h2>Sponsors & Partners</h2><button id="newPartner">Add Logo</button></div><div id="partnerList" class="list"></div></section></main><dialog id="editor"><form method="dialog" id="editForm"><h2 id="editorTitle"></h2><div id="fields"></div><menu><button value="cancel">Cancel</button><button id="saveItem" value="default">Save</button></menu></form></dialog><script src="admin.js"></script></body></html>
